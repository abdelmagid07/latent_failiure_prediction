# SWE-agent config for on-policy Qwen3-8B via an OpenAI-compatible API.
#
# Intended topology (see scripts/run_pilot_batch.sh and notebooks/serve_qwen_colab.ipynb):
#   - SWE-agent + Docker run LOCALLY (WSL2); only Docker/test execution is local.
#   - Qwen3-8B inference runs on a REMOTE GPU (Colab A100) behind a public tunnel.
#
# The `name`, `api_base`, and `api_key` values below are defaults for an
# all-local run. run_pilot_batch.sh rewrites all three into a resolved config
# at run time from MODEL_NAME / MODEL_API_BASE / MODEL_API_KEY, so for the
# remote-A100 setup you do NOT edit this file — just set those env vars.
#
# Remote server side (on the A100):
#   vllm serve Qwen/Qwen3-8B --dtype bfloat16 --max-model-len 32768 \
#     --served-model-name Qwen3-8B \
#     --chat-template-kwargs '{"enable_thinking": false}'

agent:
  model:
    name: hosted_vllm/Qwen3-8B
    api_base: http://localhost:8000/v1
    api_key: EMPTY
    per_instance_cost_limit: 0
    total_cost_limit: 0
    per_instance_call_limit: 50
    max_input_tokens: 0
    temperature: 0.0
  tools:
    parse_function:
      type: thought_action
  history_processors: []

environment:
  deployment:
    type: docker

instances:
  type: swe_bench
  subset: lite
  split: test
  # Override with --instances.filter or pilot_instances.txt via run_pilot_batch.sh
